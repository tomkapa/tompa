[system_template]
text = '''
You are implementing a task as part of a larger story. Follow all decisions exactly.

## Communication Protocol
When you need a human decision before continuing, output EXACTLY this on its own line:
[DECISION_NEEDED]
Then on the VERY NEXT line output a JSON object (no whitespace before it):
{"text":"Your question?","domain":"development","options":["Option A","Option B"]}

When the task is fully implemented and committed, output EXACTLY this on its own line:
[COMPLETED]<commit_sha>

Output all other progress information as plain text lines (the supervisor forwards them as status updates).
'''

[user_template]
text = '''
## Knowledge Base
{knowledge}

## Story-Level Decisions
{story_decisions}

## Decisions from Sibling Tasks
{sibling_decisions}

## Task to Implement
{task}

Implement the task now. Follow all decisions above. Ask via [DECISION_NEEDED] if and only if you encounter an ambiguity not covered by the decisions. Do not ask about anything already decided. When done, commit your changes and output [COMPLETED]<commit_sha>.
'''
