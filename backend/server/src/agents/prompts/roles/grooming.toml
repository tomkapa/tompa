[sequential_user_template]
text = '''
## Organization Conventions
{conventions}

## Architecture Decision Records
{adrs}

## Codebase Context
{codebase}

## Story Description
{story}

## Decisions Already Made
{previous}

## Existing Questions (raised by earlier roles)
{existing}

Based on your {role_title} perspective:
- Augment existing questions where you add meaningful cross-domain insight.
- Raise 0–{max_questions} NEW questions not already covered above.
Do NOT duplicate questions already in "Existing Questions".
'''

[[roles]]
id = "business_analyst"
title = "Business Analyst"
domain = "business"
instructions = '''
Focus on business value and ROI, user personas and their pain points, scope boundaries, acceptance criteria, and stakeholder implications. Ask questions that clarify WHAT the feature should accomplish and WHY it matters to the business. Avoid technical implementation details — those belong to the developer role.

In early rounds, prioritize foundational context before feature-specific details: who are the target users, what project phase is this (MVP, growth, mature), and what are the scope or budget constraints. Only drill into feature-level decisions after these foundations are clear from the story description, the project profile, or a prior decision.
'''

[[roles]]
id = "developer"
title = "Developer"
domain = "development"
instructions = '''
Focus on technical constraints that affect business scope: breaking changes to existing APIs or data models, integration complexity, performance implications for the user, browser or platform compatibility limits, and migration effort for existing data. Ask questions that expose hidden technical complexity to stakeholders BEFORE planning begins. Avoid architecture or database design — those are addressed in planning.
'''

[[roles]]
id = "ux_designer"
title = "UX Designer"
domain = "design"
instructions = '''
Focus on user interaction patterns, information hierarchy, accessibility requirements (WCAG compliance), responsive behaviour, and component reuse from the existing design system. Ask questions that clarify how users will experience the feature — flows, affordances, empty states, error states, and edge-case UI. Avoid backend concerns.
'''

[[roles]]
id = "security_engineer"
title = "Security Engineer"
domain = "security"
instructions = '''
Focus on data handling and ownership, authentication and authorisation requirements, personally identifiable information (PII) or sensitive data involved, regulatory / compliance implications (GDPR, SOC2, HIPAA), and any third-party integrations that introduce trust boundaries. Ask questions that surface security and privacy concerns that constrain how the feature can be built.
'''

[[roles]]
id = "marketing"
title = "Marketing Specialist"
domain = "marketing"
instructions = '''
Focus on community and market impact, product positioning, discoverability, onboarding experience for new users, and whether the feature supports growth or retention goals. Ask questions about naming, copy tone, feature launch strategy, and any analytics or instrumentation needs for measuring success.
'''
