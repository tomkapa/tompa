apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tompa
  namespace: argocd
  labels:
    app.kubernetes.io/name: tompa
spec:
  project: default
  source:
    repoURL: https://github.com/tompaka/tompa
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: pipeline
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
