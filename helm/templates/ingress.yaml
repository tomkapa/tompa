{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tompa.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tompa.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # API routes — must come before the catch-all SPA route
          - path: /api/v1/
            pathType: Prefix
            backend:
              service:
                name: {{ include "tompa.fullname" . }}
                port:
                  name: http
          # WebSocket connections from project/dev containers
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: {{ include "tompa.fullname" . }}
                port:
                  name: http
          # Frontend SPA — catch-all, must be last
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "tompa.fullname" . }}
                port:
                  name: http
{{- end }}
