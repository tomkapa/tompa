<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1376 768" width="2752" height="1536">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131124"/>
      <stop offset="60%" stop-color="#1A182E"/>
      <stop offset="100%" stop-color="#131124"/>
    </linearGradient>

    <!-- Primary purple glow -->
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5749F4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5749F4" stop-opacity="0"/>
    </radialGradient>

    <!-- Blue accent glow -->
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F5FFE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0F5FFE" stop-opacity="0"/>
    </radialGradient>

    <!-- Layer glass fill -->
    <linearGradient id="glassFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5749F4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0F5FFE" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Layer stroke gradient -->
    <linearGradient id="layerStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5749F4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0F5FFE" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Icon glow filter -->
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1376" height="768" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#5749F4" stroke-width="0.5"/>
    </pattern>
    <rect width="1376" height="768" fill="url(#grid)"/>
  </g>

  <!-- Ambient glow - purple (behind logo) -->
  <ellipse cx="280" cy="350" rx="300" ry="250" fill="url(#glowPurple)" filter="url(#softGlow)"/>

  <!-- Ambient glow - blue (behind diagram) -->
  <ellipse cx="950" cy="380" rx="350" ry="300" fill="url(#glowBlue)" filter="url(#softGlow)"/>

  <!-- ============ LEFT SIDE: Logo + Text ============ -->
  <g transform="translate(140, 180)">
    <!-- Tompa "T" Logo — geometric T with chevron legs -->
    <g transform="translate(10, 0) scale(1.35)">
      <!-- Shadow/depth outline version (offset down-right) -->
      <g transform="translate(4, 50)" opacity="0.3">
        <path d="
          M 0,0 L 120,0 L 120,14 L 74,14 L 74,36
          L 112,104 L 96,104 L 66,50 L 60,66 L 54,50
          L 24,104 L 8,104 L 46,36 L 46,14 L 0,14 Z
        " fill="none" stroke="#5749F4" stroke-width="1.2"/>
      </g>

      <!-- Main solid T shape -->
      <path d="
        M 0,0 L 120,0 L 120,14 L 74,14 L 74,36
        L 112,104 L 96,104 L 66,50 L 60,66 L 54,50
        L 24,104 L 8,104 L 46,36 L 46,14 L 0,14 Z
      " fill="#5749F4"/>

      <!-- Highlight on crossbar top edge -->
      <path d="M 0,0 L 120,0 L 120,6 L 0,6 Z" fill="#7B6FF7" opacity="0.4"/>
    </g>

    <!-- "tompa" text -->
    <text x="6" y="230" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif" font-size="72" font-weight="700" letter-spacing="-2" fill="#E8E8EA">
      tompa
    </text>

    <!-- Tagline -->
    <text x="8" y="268" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif" font-size="18" font-weight="400" letter-spacing="3" fill="#888799">
      AI-POWERED DEVELOPMENT
    </text>
  </g>

  <!-- ============ RIGHT SIDE: Isometric Layer Diagram ============ -->
  <g transform="translate(730, 120)">
    <!-- Isometric transform for the stack -->
    <g transform="skewY(-8) skewX(0)">

      <!-- Layer 4 (bottom): Merge & Traceability -->
      <g transform="translate(0, 420)" opacity="0.9">
        <rect x="40" y="0" width="480" height="100" rx="8" fill="url(#glassFill)" stroke="url(#layerStroke)" stroke-width="1"/>
        <!-- Git merge icon -->
        <g transform="translate(70, 35)" fill="none" stroke="#5749F4" stroke-width="2" filter="url(#iconGlow)">
          <circle cx="0" cy="0" r="5" fill="#5749F4" opacity="0.3"/>
          <circle cx="0" cy="24" r="5" fill="#5749F4" opacity="0.3"/>
          <circle cx="20" cy="12" r="5" fill="#5749F4" opacity="0.3"/>
          <line x1="0" y1="5" x2="0" y2="19"/>
          <path d="M 0 5 Q 10 5 20 7"/>
        </g>
        <!-- Gear icon -->
        <g transform="translate(460, 40)" fill="none" stroke="#5749F4" stroke-width="1.5" opacity="0.5" filter="url(#iconGlow)">
          <circle cx="0" cy="0" r="6"/>
          <circle cx="0" cy="0" r="2.5"/>
          <line x1="0" y1="-9" x2="0" y2="-6"/>
          <line x1="0" y1="6" x2="0" y2="9"/>
          <line x1="-9" y1="0" x2="-6" y2="0"/>
          <line x1="6" y1="0" x2="9" y2="0"/>
        </g>
        <text x="110" y="45" font-family="'Inter', sans-serif" font-size="16" font-weight="600" letter-spacing="1.5" fill="#7B6FF7" text-transform="uppercase">MERGE &amp; TRACEABILITY</text>
        <text x="110" y="68" font-family="'Inter', sans-serif" font-size="12" fill="#888799">Git commits, PRs, audit trail</text>
      </g>

      <!-- Layer 3: AI Task Execution -->
      <g transform="translate(20, 300)" opacity="0.92">
        <rect x="40" y="0" width="480" height="100" rx="8" fill="url(#glassFill)" stroke="url(#layerStroke)" stroke-width="1"/>
        <!-- Terminal/code icon -->
        <g transform="translate(70, 35)" fill="none" stroke="#5749F4" stroke-width="2" filter="url(#iconGlow)">
          <rect x="-8" y="-8" width="30" height="22" rx="3" stroke-width="1.5"/>
          <polyline points="-2,-2 4,3 -2,8"/>
          <line x1="8" y1="8" x2="16" y2="8"/>
        </g>
        <!-- Progress dots -->
        <g transform="translate(445, 40)" fill="#5749F4" opacity="0.4">
          <circle cx="0" cy="0" r="3"/>
          <circle cx="12" cy="0" r="3"/>
          <circle cx="24" cy="0" r="3"/>
        </g>
        <text x="110" y="45" font-family="'Inter', sans-serif" font-size="16" font-weight="600" letter-spacing="1.5" fill="#7B6FF7" text-transform="uppercase">AI TASK EXECUTION</text>
        <text x="110" y="68" font-family="'Inter', sans-serif" font-size="12" fill="#888799">Claude Code implementation &amp; testing</text>
      </g>

      <!-- Layer 2: Decision Q&A & Planning -->
      <g transform="translate(40, 180)" opacity="0.95">
        <rect x="40" y="0" width="480" height="100" rx="8" fill="url(#glassFill)" stroke="url(#layerStroke)" stroke-width="1"/>
        <!-- Chat/Q&A icon -->
        <g transform="translate(70, 35)" fill="none" stroke="#5749F4" stroke-width="2" filter="url(#iconGlow)">
          <rect x="-8" y="-6" width="24" height="16" rx="4" stroke-width="1.5"/>
          <polyline points="-2,10 2,16 6,10"/>
          <line x1="-2" y1="0" x2="10" y2="0"/>
          <line x1="-2" y1="5" x2="6" y2="5"/>
        </g>
        <!-- Lightbulb icon -->
        <g transform="translate(460, 38)" fill="none" stroke="#5749F4" stroke-width="1.5" opacity="0.5" filter="url(#iconGlow)">
          <path d="M 0 -10 Q 8 -8 8 -2 Q 8 4 3 6 L 3 10 L -3 10 L -3 6 Q -8 4 -8 -2 Q -8 -8 0 -10 Z"/>
          <line x1="-2" y1="12" x2="2" y2="12"/>
        </g>
        <text x="110" y="45" font-family="'Inter', sans-serif" font-size="16" font-weight="600" letter-spacing="1.5" fill="#7B6FF7" text-transform="uppercase">DECISION Q&amp;A &amp; PLANNING</text>
        <text x="110" y="68" font-family="'Inter', sans-serif" font-size="12" fill="#888799">Contextual questions &amp; task decomposition</text>
      </g>

      <!-- Layer 1 (top): Story Context -->
      <g transform="translate(60, 60)" opacity="1">
        <rect x="40" y="0" width="480" height="100" rx="8" fill="url(#glassFill)" stroke="url(#layerStroke)" stroke-width="1"/>
        <!-- Document/story icon -->
        <g transform="translate(70, 35)" fill="none" stroke="#5749F4" stroke-width="2" filter="url(#iconGlow)">
          <rect x="-6" y="-10" width="20" height="24" rx="2" stroke-width="1.5"/>
          <line x1="-1" y1="-4" x2="9" y2="-4"/>
          <line x1="-1" y1="0" x2="9" y2="0"/>
          <line x1="-1" y1="4" x2="5" y2="4"/>
        </g>
        <!-- Database icon -->
        <g transform="translate(458, 32)" fill="none" stroke="#5749F4" stroke-width="1.5" opacity="0.5" filter="url(#iconGlow)">
          <ellipse cx="0" cy="0" rx="10" ry="4"/>
          <path d="M -10 0 L -10 14 Q 0 22 10 14 L 10 0"/>
          <path d="M -10 7 Q 0 15 10 7" opacity="0.5"/>
        </g>
        <text x="110" y="45" font-family="'Inter', sans-serif" font-size="16" font-weight="600" letter-spacing="1.5" fill="#7B6FF7" text-transform="uppercase">STORY CONTEXT</text>
        <text x="110" y="68" font-family="'Inter', sans-serif" font-size="12" fill="#888799">Requirements, specs &amp; knowledge base</text>
      </g>

      <!-- Vertical connection lines between layers -->
      <g stroke="#5749F4" stroke-width="1" opacity="0.2" stroke-dasharray="4,4">
        <line x1="340" y1="168" x2="320" y2="188"/>
        <line x1="320" y1="288" x2="300" y2="308"/>
        <line x1="300" y1="408" x2="280" y2="428"/>
      </g>

      <!-- Flow arrows -->
      <g fill="#5749F4" opacity="0.35">
        <polygon points="335,175 340,185 330,185" transform="rotate(-8, 335, 180)"/>
        <polygon points="315,295 320,305 310,305" transform="rotate(-8, 315, 300)"/>
        <polygon points="295,415 300,425 290,425" transform="rotate(-8, 295, 420)"/>
      </g>
    </g>
  </g>

  <!-- ============ Decorative Elements ============ -->

  <!-- Floating dots -->
  <g fill="#5749F4" opacity="0.15">
    <circle cx="620" cy="100" r="2"/>
    <circle cx="680" cy="680" r="1.5"/>
    <circle cx="1100" cy="150" r="2"/>
  </g>

  <!-- Subtle corner accent lines -->
  <g stroke="#2B283D" stroke-width="1" opacity="0.5">
    <line x1="30" y1="30" x2="30" y2="60"/>
    <line x1="30" y1="30" x2="60" y2="30"/>
    <line x1="1346" y1="738" x2="1346" y2="708"/>
    <line x1="1346" y1="738" x2="1316" y2="738"/>
  </g>
</svg>
