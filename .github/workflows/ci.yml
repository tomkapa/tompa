name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Backend ───────────────────────────────────────────────────────────────
  backend-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
        env:
          SQLX_OFFLINE: "true"

      - name: build
        run: cargo build
        env:
          SQLX_OFFLINE: "true"

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run migrations
        run: sqlx migrate run --source server/migrations
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test

      - name: test
        run: cargo test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: install
        run: bun install

      - name: typecheck
        run: bun run typecheck

      - name: lint
        run: bun run lint

      - name: test
        run: bun run test

  # ── API contract ──────────────────────────────────────────────────────────
  # Regenerates the OpenAPI spec and TypeScript client, then fails if the
  # committed files differ from what would be generated. This ensures the
  # frontend SDK always matches the server's actual API shape.
  api-contract:
    runs-on: ubuntu-latest
    needs: [backend-check]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: oven-sh/setup-bun@v2

      - name: Generate OpenAPI spec
        working-directory: backend
        run: cargo run --bin generate-openapi > ../openapi.json
        env:
          SQLX_OFFLINE: "true"

      - name: Install frontend deps
        working-directory: frontend
        run: bun install

      - name: Regenerate API client
        working-directory: frontend
        run: bun run generate-api

      - name: Check for drift
        run: git diff --exit-code

  # ── Docker builds ─────────────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check, api-contract]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/server/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/agent/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: mikefarah/yq@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: Update Helm image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          yq -i '.server.image.tag = "${{ github.sha }}"' helm/values.yaml
          yq -i '.agent.image.tag = "${{ github.sha }}"' helm/values.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add helm/values.yaml
          git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push
